<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>Document</title>
</head>

<body>
    <h3>Calcul heures</h1>
        <div>
            <div class="field_box">
                <label for="">Début</label>
                <div>
                    <input id="start_hour" type="number" max="23" min="0" value="8"> :
                    <input id="start_min" type="number" max="59" min="0" value="0">
                </div>
            </div>

            <div class="field_box">
                <label for="">Fin</label>
                <div>
                    <input id="stop_hour" type="number" max="23" min="0" value="16"> :
                    <input id="stop_min" type="number" max="59" min="0" value="30">
                </div>
            </div>

            <div class="field_box">
                <label for="">Pause (min)</label>
                <div>
                    <input id="break" type="number" max="23" min="0" value="30">
                </div>
            </div>


            <div class="field_box">
                <label for="">Total</label>
                <span id="result_tot">0</span>
            </div>

            <div class="field_box">
                <label for="">Sup</label>
                <span id="result_sup">0</span>
            </div>
            <button id="btn">CALCULER</button>
        </div>
        <script src="app.js"></script>
</body>

</html>
